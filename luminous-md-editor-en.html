<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luminous — Markdown Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,300;1,8..60,400;1,8..60,500&family=Source+Code+Pro:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #fafaf9;
  --bg-secondary: #f5f5f4;
  --bg-editor: #ffffff;
  --bg-preview: #ffffff;
  --bg-code: #f7f7f8;
  --bg-code-block: #1e1e2e;
  --bg-toolbar: #ffffff;
  --bg-hover: #f0efed;
  --border-color: #e7e5e4;
  --border-subtle: #f0efed;
  --text-primary: #1c1917;
  --text-secondary: #57534e;
  --text-tertiary: #a8a29e;
  --text-code: #e0def4;
  --accent: #c2956b;
  --accent-hover: #b07d52;
  --accent-subtle: #fef3e2;
  --link-color: #8b6c4f;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  --radius: 8px;
  --font-sans: 'Source Sans 3', 'Noto Sans JP', sans-serif;
  --font-serif: 'Source Serif 4', 'Noto Serif JP', serif;
  --font-mono: 'Source Code Pro', monospace;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg-primary: #1a1a1a;
  --bg-secondary: #222222;
  --bg-editor: #1e1e1e;
  --bg-preview: #1e1e1e;
  --bg-code: #2a2a2e;
  --bg-code-block: #16161e;
  --bg-toolbar: #222222;
  --bg-hover: #2a2a2a;
  --border-color: #333333;
  --border-subtle: #2a2a2a;
  --text-primary: #e8e6e3;
  --text-secondary: #a8a29e;
  --text-tertiary: #6b6560;
  --text-code: #e0def4;
  --accent: #d4a574;
  --accent-hover: #c2956b;
  --accent-subtle: #3d2e1e;
  --link-color: #d4a574;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background var(--transition), color var(--transition);
}

/* ─── Toolbar ─── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg-toolbar);
  border-bottom: 1px solid var(--border-color);
  z-index: 100;
  flex-shrink: 0;
  transition: background var(--transition), border-color var(--transition);
}

.toolbar-brand {
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: 16px;
  color: var(--accent);
  margin-right: 8px;
  letter-spacing: 0.02em;
  user-select: none;
}

.toolbar-divider {
  width: 1px;
  height: 24px;
  background: var(--border-color);
  margin: 0 4px;
}

.toolbar-filename {
  font-size: 13px;
  color: var(--text-secondary);
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.toolbar-filename .unsaved {
  color: var(--accent);
  font-weight: 600;
}

.toolbar-spacer { flex: 1; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: var(--bg-primary);
  color: var(--text-secondary);
  font-family: var(--font-sans);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--text-tertiary);
}

.btn-icon {
  padding: 6px 8px;
  border: none;
  background: transparent;
}

.btn-icon:hover {
  background: var(--bg-hover);
  border: none;
}

.btn-accent {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.btn-accent:hover {
  background: var(--accent-hover);
  color: #fff;
  border-color: var(--accent-hover);
}

.btn svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.view-toggle {
  display: flex;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  overflow: hidden;
}

.view-toggle .btn {
  border: none;
  border-radius: 0;
  border-right: 1px solid var(--border-color);
  padding: 6px 10px;
}

.view-toggle .btn:last-child { border-right: none; }

.view-toggle .btn.active {
  background: var(--accent-subtle);
  color: var(--accent);
}

/* ─── Main Content ─── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ─── Editor Panel ─── */
.editor-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border-color);
  min-width: 0;
  transition: border-color var(--transition);
}

.editor-panel.hidden { display: none; }

.editor-header {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-subtle);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}

#editor {
  flex: 1;
  width: 100%;
  padding: 32px 40px;
  border: none;
  outline: none;
  resize: none;
  background: var(--bg-editor);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.75;
  tab-size: 2;
  overflow-y: auto;
  transition: background var(--transition), color var(--transition);
}

#editor::placeholder {
  color: var(--text-tertiary);
}

/* ─── Resize Handle ─── */
.resize-handle {
  width: 5px;
  cursor: col-resize;
  background: transparent;
  position: relative;
  flex-shrink: 0;
  z-index: 10;
}

.resize-handle::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 3px;
  height: 40px;
  border-radius: 3px;
  background: var(--border-color);
  opacity: 0;
  transition: opacity var(--transition);
}

.resize-handle:hover::after,
.resize-handle.dragging::after {
  opacity: 1;
}

/* ─── Preview Panel ─── */
.preview-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg-preview);
  transition: background var(--transition);
}

.preview-panel.hidden { display: none; }

.preview-header {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-subtle);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}

#preview {
  flex: 1;
  overflow-y: auto;
  padding: 40px 56px;
  max-width: 100%;
}

/* ─── Preview Content Styles (Claude-like) ─── */
.preview-content {
  max-width: 760px;
  margin: 0 auto;
  font-family: var(--font-serif);
  font-size: 16.5px;
  line-height: 1.8;
  color: var(--text-primary);
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.preview-content h1 {
  font-family: var(--font-serif);
  font-size: 2em;
  font-weight: 700;
  line-height: 1.25;
  margin-top: 2em;
  margin-bottom: 0.75em;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.preview-content h1:first-child { margin-top: 0; }

.preview-content h2 {
  font-family: var(--font-serif);
  font-size: 1.5em;
  font-weight: 600;
  line-height: 1.3;
  margin-top: 1.8em;
  margin-bottom: 0.6em;
  color: var(--text-primary);
  letter-spacing: -0.005em;
}

.preview-content h3 {
  font-family: var(--font-sans);
  font-size: 1.15em;
  font-weight: 600;
  line-height: 1.4;
  margin-top: 1.6em;
  margin-bottom: 0.5em;
  color: var(--text-primary);
}

.preview-content h4, .preview-content h5, .preview-content h6 {
  font-family: var(--font-sans);
  font-size: 1em;
  font-weight: 600;
  line-height: 1.5;
  margin-top: 1.4em;
  margin-bottom: 0.4em;
  color: var(--text-secondary);
}

.preview-content p {
  margin-bottom: 1em;
}

.preview-content a {
  color: var(--link-color);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color var(--transition);
}

.preview-content a:hover {
  border-bottom-color: var(--link-color);
}

.preview-content strong {
  font-weight: 600;
  color: var(--text-primary);
}

.preview-content em {
  font-style: italic;
}

.preview-content blockquote {
  border-left: 3px solid var(--accent);
  margin: 1.5em 0;
  padding: 0.6em 1.2em;
  color: var(--text-secondary);
  background: var(--accent-subtle);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-style: italic;
}

.preview-content blockquote p:last-child { margin-bottom: 0; }

.preview-content code {
  font-family: var(--font-mono);
  font-size: 0.88em;
  background: var(--bg-code);
  padding: 0.15em 0.4em;
  border-radius: 4px;
  color: var(--text-primary);
}

.preview-content pre {
  margin: 1.5em 0;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  position: relative;
}

.preview-content pre code {
  display: block;
  padding: 1.2em 1.5em;
  background: var(--bg-code-block);
  color: var(--text-code);
  font-size: 13.5px;
  line-height: 1.65;
  overflow-x: auto;
  border-radius: 0;
}

.preview-content pre .code-lang {
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 11px;
  color: #666;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  opacity: 0.5;
}

.preview-content ul, .preview-content ol {
  margin: 0.8em 0 1em 0;
  padding-left: 1.6em;
}

.preview-content li {
  margin-bottom: 0.35em;
  line-height: 1.7;
}

.preview-content li > ul, .preview-content li > ol {
  margin-top: 0.3em;
  margin-bottom: 0.3em;
}

.preview-content hr {
  border: none;
  height: 1px;
  background: var(--border-color);
  margin: 2.5em 0;
}

.preview-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 1.5em 0;
  font-family: var(--font-sans);
  font-size: 0.92em;
  box-shadow: var(--shadow-sm);
  border-radius: var(--radius);
  overflow: hidden;
}

.preview-content thead {
  background: var(--bg-secondary);
}

.preview-content th {
  font-weight: 600;
  text-align: left;
  padding: 10px 16px;
  border-bottom: 2px solid var(--border-color);
  color: var(--text-secondary);
  font-size: 0.9em;
  letter-spacing: 0.02em;
}

.preview-content td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border-subtle);
}

.preview-content tbody tr:last-child td { border-bottom: none; }

.preview-content tbody tr:hover {
  background: var(--bg-hover);
}

.preview-content img {
  max-width: 100%;
  border-radius: var(--radius);
  margin: 1em 0;
  box-shadow: var(--shadow-sm);
}

.preview-content .task-list-item {
  list-style: none;
  margin-left: -1.6em;
  padding-left: 0;
}

.preview-content .task-list-item input[type="checkbox"] {
  margin-right: 0.5em;
  accent-color: var(--accent);
}

.preview-content .katex-display {
  margin: 1.5em 0;
  overflow-x: auto;
}

.preview-content mark {
  background: #fef08a;
  padding: 0.1em 0.3em;
  border-radius: 3px;
}

[data-theme="dark"] .preview-content mark {
  background: #854d0e;
  color: #fef3c7;
}

/* ─── Drop Zone ─── */
.drop-overlay {
  position: fixed;
  inset: 0;
  background: rgba(194, 149, 107, 0.15);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}

.drop-overlay.active { display: flex; }

.drop-message {
  background: var(--bg-preview);
  border: 2px dashed var(--accent);
  border-radius: 16px;
  padding: 48px 64px;
  text-align: center;
  box-shadow: var(--shadow-lg);
}

.drop-message svg {
  width: 48px;
  height: 48px;
  color: var(--accent);
  margin-bottom: 16px;
}

.drop-message h3 {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.drop-message p {
  font-size: 14px;
  color: var(--text-secondary);
}

/* ─── Welcome Screen ─── */
.welcome {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}

.welcome.hidden { display: none; }

.welcome-content {
  max-width: 420px;
}

.welcome-icon {
  width: 64px;
  height: 64px;
  color: var(--accent);
  margin-bottom: 24px;
  opacity: 0.7;
}

.welcome h2 {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text-primary);
}

.welcome p {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 24px;
}

.welcome-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
}

/* ─── Status Bar ─── */
.statusbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 4px 16px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  font-size: 11px;
  color: var(--text-tertiary);
  flex-shrink: 0;
  transition: background var(--transition), border-color var(--transition);
}

.statusbar-spacer { flex: 1; }

/* ─── Toast ─── */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text-primary);
  color: var(--bg-primary);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 999;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--text-tertiary);
}

/* ─── Print ─── */
@media print {
  .toolbar, .statusbar, .editor-panel, .resize-handle, .preview-header, .drop-overlay, .toast { display: none !important; }
  body {
    height: auto !important;
    overflow: visible !important;
  }
  .main {
    overflow: visible !important;
    display: block !important;
  }
  .preview-panel {
    border: none !important;
    overflow: visible !important;
    display: block !important;
    height: auto !important;
  }
  #preview {
    padding: 0 !important;
    overflow: visible !important;
    height: auto !important;
  }
  .preview-content {
    max-width: 100% !important;
  }
}

/* ─── Responsive ─── */
@media (max-width: 768px) {
  #preview { padding: 24px 20px; }
  #editor { padding: 20px; }
  .toolbar { padding: 8px 10px; gap: 4px; }
  .toolbar-filename { display: none; }
}
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <span class="toolbar-brand">✦ Luminous</span>
  <div class="toolbar-divider"></div>
  <span class="toolbar-filename" id="filenameDisplay">Untitled Document</span>
  <div class="toolbar-spacer"></div>

  <button class="btn btn-icon" onclick="createNew()" title="New">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
  </button>
  <button class="btn btn-icon" onclick="openFile()" title="Open File">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
  </button>
  <button class="btn btn-icon" onclick="saveFile()" title="Save (Ctrl+S)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
  </button>
  <button class="btn btn-icon" onclick="saveAsFile()" title="Save As (Ctrl+Shift+S)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/><line x1="12" y1="18" x2="12" y2="15"/><line x1="10.5" y1="16.5" x2="13.5" y2="16.5"/></svg>
  </button>

  <div class="toolbar-divider"></div>

  <div class="view-toggle">
    <button class="btn" id="viewBoth" onclick="setView('both')" title="Split View">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
    </button>
    <button class="btn" id="viewEditor" onclick="setView('editor')" title="Editor Only">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
    </button>
    <button class="btn" id="viewPreview" onclick="setView('preview')" title="Preview Only">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>

  <div class="toolbar-divider"></div>

  <button class="btn btn-icon" id="themeToggle" onclick="toggleTheme()" title="Toggle Theme">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  <button class="btn btn-icon" onclick="printPreview()" title="Print / Export PDF">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
  </button>
</div>

<!-- Main Content -->
<div class="main" id="mainContent">
  <!-- Welcome Screen -->
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-content">
      <svg class="welcome-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <h2>Luminous</h2>
      <p>Beautifully render and edit your Markdown files.<br>Drag &amp; drop a file, or get started with the buttons below.</p>
      <div class="welcome-actions">
        <button class="btn" onclick="openFile()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Open File
        </button>
        <button class="btn btn-accent" onclick="createNew()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          New
        </button>
      </div>
    </div>
  </div>

  <!-- Editor Panel -->
  <div class="editor-panel hidden" id="editorPanel">
    <div class="editor-header">Editor</div>
    <textarea id="editor" placeholder="Start writing Markdown..." spellcheck="false"></textarea>
  </div>

  <!-- Resize Handle -->
  <div class="resize-handle hidden" id="resizeHandle"></div>

  <!-- Preview Panel -->
  <div class="preview-panel hidden" id="previewPanel">
    <div class="preview-header">Preview</div>
    <div id="preview">
      <div class="preview-content" id="previewContent"></div>
    </div>
  </div>
</div>

<!-- Status Bar -->
<div class="statusbar">
  <span id="charCount">0 chars</span>
  <span id="wordCount">0 words</span>
  <span id="lineCount">0 lines</span>
  <div class="statusbar-spacer"></div>
  <span>Markdown</span>
</div>

<!-- Drop Overlay -->
<div class="drop-overlay" id="dropOverlay">
  <div class="drop-message">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    <h3>Drop Here</h3>
    <p>Open a .md file</p>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".md,.markdown,.txt,.text" style="display:none">

<script>
// ─── State ───
let currentFile = null;
let isDirty = false;
let currentView = 'both';
let editorRatio = 0.5;

const editor = document.getElementById('editor');
const previewContent = document.getElementById('previewContent');
const editorPanel = document.getElementById('editorPanel');
const previewPanel = document.getElementById('previewPanel');
const resizeHandle = document.getElementById('resizeHandle');
const welcomeScreen = document.getElementById('welcomeScreen');
const filenameDisplay = document.getElementById('filenameDisplay');
const fileInput = document.getElementById('fileInput');
const toast = document.getElementById('toast');

// ─── Marked Configuration ───
const renderer = new marked.Renderer();

// Code blocks with language label
renderer.code = function(code, language) {
  const text = typeof code === 'object' ? code.text : code;
  const lang = typeof code === 'object' ? code.lang : language;
  let highlighted;
  try {
    if (lang && hljs.getLanguage(lang)) {
      highlighted = hljs.highlight(text, { language: lang }).value;
    } else {
      highlighted = hljs.highlightAuto(text).value;
    }
  } catch(e) {
    highlighted = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  const langLabel = lang ? `<span class="code-lang">${lang}</span>` : '';
  return `<pre>${langLabel}<code class="hljs">${highlighted}</code></pre>`;
};

// Task list items
renderer.listitem = function(text) {
  const t = typeof text === 'object' ? text.text : text;
  if (t.startsWith('<input')) {
    return `<li class="task-list-item">${t}</li>`;
  }
  return `<li>${t}</li>`;
};

marked.setOptions({
  renderer: renderer,
  breaks: true,
  gfm: true,
});

// ─── KaTeX support ───
function renderMath(text) {
  // Block math: $$...$$
  text = text.replace(/\$\$([\s\S]+?)\$\$/g, (match, math) => {
    try {
      return katex.renderToString(math.trim(), { displayMode: true, throwOnError: false });
    } catch(e) { return match; }
  });
  // Inline math: $...$
  text = text.replace(/\$([^\$\n]+?)\$/g, (match, math) => {
    try {
      return katex.renderToString(math.trim(), { displayMode: false, throwOnError: false });
    } catch(e) { return match; }
  });
  return text;
}

// ─── Render ───
function render() {
  const raw = editor.value;
  const withMath = renderMath(raw);
  previewContent.innerHTML = marked.parse(withMath);
  updateStats();
}

function updateStats() {
  const text = editor.value;
  document.getElementById('charCount').textContent = text.length + ' chars';
  // Count CJK chars + words
  const cjk = (text.match(/[\u3000-\u9FFF\uF900-\uFAFF]/g) || []).length;
  const words = (text.match(/[a-zA-Z]+/g) || []).length;
  document.getElementById('wordCount').textContent = (cjk + words) + ' words';
  document.getElementById('lineCount').textContent = (text.split('\n').length) + ' lines';
}

// ─── Debounced render ───
let renderTimer;
editor.addEventListener('input', () => {
  isDirty = true;
  updateFilenameDisplay();
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 120);
});

// ─── Tab support ───
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    editor.dispatchEvent(new Event('input'));
  }
});

// ─── File Operations ───
function createNew() {
  if (isDirty && !confirm('You have unsaved changes. Create a new document?')) return;
  currentFile = null;
  editor.value = '';
  isDirty = false;
  welcomeScreen.classList.add('hidden');
  setView(currentView);
  updateFilenameDisplay();
  render();
  editor.focus();
  showToast('New document created');
}

function openFile() {
  fileInput.click();
}

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  loadFile(file);
  fileInput.value = '';
});

function loadFile(file) {
  if (isDirty && !confirm('You have unsaved changes. Open a new file?')) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    currentFile = file.name;
    editor.value = e.target.result;
    isDirty = false;
    welcomeScreen.classList.add('hidden');
    setView(currentView);
    updateFilenameDisplay();
    render();
    showToast(`${file.name} opened`);
  };
  reader.readAsText(file);
}

function saveFile() {
  const content = editor.value;
  const filename = currentFile || 'Untitled.md';
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  isDirty = false;
  if (!currentFile) currentFile = filename;
  updateFilenameDisplay();
  showToast('Saved');
}

function saveAsFile() {
  const newName = prompt('Enter file name:', currentFile || 'Untitled.md');
  if (!newName) return;
  const filename = newName.endsWith('.md') ? newName : newName + '.md';
  const content = editor.value;
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  currentFile = filename;
  isDirty = false;
  updateFilenameDisplay();
  showToast(`${filename} saved`);
}

function updateFilenameDisplay() {
  const name = currentFile || 'Untitled Document';
  const unsaved = isDirty ? '<span class="unsaved"> ●</span>' : '';
  filenameDisplay.innerHTML = name + unsaved;
}

// ─── View Modes ───
function setView(mode) {
  currentView = mode;
  document.querySelectorAll('.view-toggle .btn').forEach(b => b.classList.remove('active'));

  if (mode === 'both') {
    editorPanel.classList.remove('hidden');
    previewPanel.classList.remove('hidden');
    resizeHandle.classList.remove('hidden');
    document.getElementById('viewBoth').classList.add('active');
    editorPanel.style.flex = editorRatio;
    previewPanel.style.flex = 1 - editorRatio;
  } else if (mode === 'editor') {
    editorPanel.classList.remove('hidden');
    previewPanel.classList.add('hidden');
    resizeHandle.classList.add('hidden');
    document.getElementById('viewEditor').classList.add('active');
    editorPanel.style.flex = 1;
  } else {
    editorPanel.classList.add('hidden');
    previewPanel.classList.remove('hidden');
    resizeHandle.classList.add('hidden');
    document.getElementById('viewPreview').classList.add('active');
    previewPanel.style.flex = 1;
  }
  render();
}

// ─── Resize Handle ───
let isResizing = false;
resizeHandle.addEventListener('mousedown', (e) => {
  isResizing = true;
  resizeHandle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const main = document.getElementById('mainContent');
  const rect = main.getBoundingClientRect();
  editorRatio = Math.max(0.2, Math.min(0.8, (e.clientX - rect.left) / rect.width));
  editorPanel.style.flex = editorRatio;
  previewPanel.style.flex = 1 - editorRatio;
});

document.addEventListener('mouseup', () => {
  if (isResizing) {
    isResizing = false;
    resizeHandle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// ─── Drag & Drop ───
let dragCounter = 0;
document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  document.getElementById('dropOverlay').classList.add('active');
});

document.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter === 0) {
    document.getElementById('dropOverlay').classList.remove('active');
  }
});

document.addEventListener('dragover', (e) => e.preventDefault());

document.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  document.getElementById('dropOverlay').classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file && (file.name.endsWith('.md') || file.name.endsWith('.markdown') || file.name.endsWith('.txt'))) {
    loadFile(file);
  } else {
    showToast('Please drop a Markdown file (.md)');
  }
});

// ─── Theme ───
function toggleTheme() {
  const isDark = document.body.getAttribute('data-theme') === 'dark';
  document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem('luminous-theme', isDark ? 'light' : 'dark');
}

// Load saved theme
const savedTheme = localStorage.getItem('luminous-theme');
if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  document.body.setAttribute('data-theme', 'dark');
}

// ─── Keyboard Shortcuts ───
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'S') {
    e.preventDefault();
    saveAsFile();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveFile();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
    e.preventDefault();
    openFile();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    createNew();
  }
});

// ─── Print ───
function printPreview() {
  window.print();
}

// ─── Toast ───
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ─── Init ───
updateStats();
</script>
</body>
</html>
