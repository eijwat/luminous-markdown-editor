<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luminous — Markdown Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/gfm/gfm.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/overlay.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,300;1,8..60,400;1,8..60,500&family=Source+Code+Pro:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #fafaf9;
  --bg-secondary: #f5f5f4;
  --bg-editor: #ffffff;
  --bg-preview: #ffffff;
  --bg-code: #f7f7f8;
  --bg-code-block: #1e1e2e;
  --bg-toolbar: #ffffff;
  --bg-hover: #f0efed;
  --border-color: #e7e5e4;
  --border-subtle: #f0efed;
  --text-primary: #1c1917;
  --text-secondary: #57534e;
  --text-tertiary: #a8a29e;
  --text-code: #e0def4;
  --accent: #c2956b;
  --accent-hover: #b07d52;
  --accent-subtle: #fef3e2;
  --link-color: #8b6c4f;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  --radius: 8px;
  --font-sans: 'Source Sans 3', 'Noto Sans JP', sans-serif;
  --font-serif: 'Source Serif 4', 'Noto Serif JP', serif;
  --font-mono: 'Source Code Pro', monospace;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg-primary: #1a1a1a;
  --bg-secondary: #222222;
  --bg-editor: #1e1e1e;
  --bg-preview: #1e1e1e;
  --bg-code: #2a2a2e;
  --bg-code-block: #16161e;
  --bg-toolbar: #222222;
  --bg-hover: #2a2a2a;
  --border-color: #333333;
  --border-subtle: #2a2a2a;
  --text-primary: #e8e6e3;
  --text-secondary: #a8a29e;
  --text-tertiary: #6b6560;
  --text-code: #e0def4;
  --accent: #d4a574;
  --accent-hover: #c2956b;
  --accent-subtle: #3d2e1e;
  --link-color: #d4a574;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background var(--transition), color var(--transition);
}

/* ─── Toolbar ─── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg-toolbar);
  border-bottom: 1px solid var(--border-color);
  z-index: 100;
  flex-shrink: 0;
  transition: background var(--transition), border-color var(--transition);
}

.toolbar-brand {
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: 16px;
  color: var(--accent);
  margin-right: 8px;
  letter-spacing: 0.02em;
  user-select: none;
}

.toolbar-divider {
  width: 1px;
  height: 24px;
  background: var(--border-color);
  margin: 0 4px;
}

.toolbar-filename {
  font-size: 13px;
  color: var(--text-secondary);
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.toolbar-filename .unsaved {
  color: var(--accent);
  font-weight: 600;
}

.toolbar-spacer { flex: 1; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: var(--bg-primary);
  color: var(--text-secondary);
  font-family: var(--font-sans);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--text-tertiary);
}

.btn-icon {
  padding: 6px 8px;
  border: none;
  background: transparent;
}

.btn-icon:hover {
  background: var(--bg-hover);
  border: none;
}

.btn-accent {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.btn-accent:hover {
  background: var(--accent-hover);
  color: #fff;
  border-color: var(--accent-hover);
}

.btn svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.view-toggle {
  display: flex;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  overflow: hidden;
}

.view-toggle .btn {
  border: none;
  border-radius: 0;
  border-right: 1px solid var(--border-color);
  padding: 6px 10px;
}

.view-toggle .btn:last-child { border-right: none; }

.view-toggle .btn.active {
  background: var(--accent-subtle);
  color: var(--accent);
}

/* ─── Main Content ─── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ─── Editor Panel ─── */
.editor-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border-color);
  min-width: 0;
  overflow: hidden;
  transition: border-color var(--transition);
}

.editor-panel.hidden { display: none; }

.editor-header {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-subtle);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  flex-shrink: 0;
}

/* ─── Formatting Toolbar ─── */
.format-bar {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 4px 12px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.format-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 28px;
  border: none;
  border-radius: 4px;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}

.format-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.format-btn:active {
  background: var(--accent-subtle);
  color: var(--accent);
}

.format-btn svg { width: 16px; height: 16px; }

.format-btn .fmt-label {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  line-height: 1;
}

.format-sep {
  width: 1px;
  height: 18px;
  background: var(--border-color);
  margin: 0 4px;
  flex-shrink: 0;
}

.format-btn[title]:hover::after {
  content: attr(title);
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  margin-top: 6px;
  padding: 4px 8px;
  background: var(--text-primary);
  color: var(--bg-primary);
  font-size: 11px;
  font-family: var(--font-sans);
  font-weight: 400;
  white-space: nowrap;
  border-radius: 4px;
  z-index: 100;
  pointer-events: none;
}

/* ─── CodeMirror Container ─── */
#editorContainer {
  flex: 1;
  overflow: hidden;
  position: relative;
}

#editorContainer .CodeMirror {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  height: 100%;
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.75;
  background: var(--bg-editor);
  color: var(--text-primary);
  border: none;
}

#editorContainer .CodeMirror-scroll {
  padding: 24px 32px;
}

#editorContainer .CodeMirror-gutters {
  background: var(--bg-editor);
  border-right: none;
}

#editorContainer .CodeMirror-cursor {
  border-left-color: var(--accent);
  border-left-width: 2px;
}

#editorContainer .CodeMirror-selected {
  background: var(--accent-subtle) !important;
}

#editorContainer .CodeMirror-focused .CodeMirror-selected {
  background: var(--accent-subtle) !important;
}

/* GFM syntax colors */
#editorContainer .cm-header { color: var(--text-primary); font-weight: 600; }
#editorContainer .cm-header-1 { font-size: 1.3em; }
#editorContainer .cm-header-2 { font-size: 1.15em; }
#editorContainer .cm-header-3 { font-size: 1.05em; }
#editorContainer .cm-strong { font-weight: 600; color: var(--text-primary); }
#editorContainer .cm-em { font-style: italic; }
#editorContainer .cm-link { color: var(--link-color); text-decoration: none; }
#editorContainer .cm-url { color: var(--text-tertiary); }
#editorContainer .cm-comment { color: var(--text-tertiary); }
#editorContainer .cm-quote { color: var(--text-secondary); font-style: italic; }
#editorContainer .cm-keyword { color: #9d7cd8; }
#editorContainer .cm-atom { color: #ff9e64; }
#editorContainer .cm-number { color: #ff9e64; }
#editorContainer .cm-def { color: #7dcfff; }
#editorContainer .cm-variable { color: var(--text-primary); }
#editorContainer .cm-string { color: #9ece6a; }
#editorContainer .cm-tag { color: #f7768e; }
#editorContainer .cm-attribute { color: #bb9af7; }

[data-theme="dark"] #editorContainer .CodeMirror {
  background: var(--bg-editor);
  color: var(--text-primary);
}
[data-theme="dark"] #editorContainer .CodeMirror-gutters {
  background: var(--bg-editor);
}

/* ─── Resize Handle ─── */
.resize-handle {
  width: 5px;
  cursor: col-resize;
  background: transparent;
  position: relative;
  flex-shrink: 0;
  z-index: 10;
}

.resize-handle::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 3px;
  height: 40px;
  border-radius: 3px;
  background: var(--border-color);
  opacity: 0;
  transition: opacity var(--transition);
}

.resize-handle:hover::after,
.resize-handle.dragging::after {
  opacity: 1;
}

/* ─── Preview Panel ─── */
.preview-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg-preview);
  transition: background var(--transition);
}

.preview-panel.hidden { display: none; }

.preview-header {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-subtle);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  flex-shrink: 0;
}

#preview {
  flex: 1;
  overflow-y: auto;
  padding: 40px 56px;
  max-width: 100%;
}

/* ─── Preview Content Styles (Claude-like) ─── */
.preview-content {
  max-width: 760px;
  margin: 0 auto;
  font-family: var(--font-serif);
  font-size: 16.5px;
  line-height: 1.8;
  color: var(--text-primary);
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.preview-content h1 {
  font-family: var(--font-serif);
  font-size: 2em;
  font-weight: 700;
  line-height: 1.25;
  margin-top: 2em;
  margin-bottom: 0.75em;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.preview-content h1:first-child { margin-top: 0; }

.preview-content h2 {
  font-family: var(--font-serif);
  font-size: 1.5em;
  font-weight: 600;
  line-height: 1.3;
  margin-top: 1.8em;
  margin-bottom: 0.6em;
  color: var(--text-primary);
  letter-spacing: -0.005em;
}

.preview-content h3 {
  font-family: var(--font-sans);
  font-size: 1.15em;
  font-weight: 600;
  line-height: 1.4;
  margin-top: 1.6em;
  margin-bottom: 0.5em;
  color: var(--text-primary);
}

.preview-content h4, .preview-content h5, .preview-content h6 {
  font-family: var(--font-sans);
  font-size: 1em;
  font-weight: 600;
  line-height: 1.5;
  margin-top: 1.4em;
  margin-bottom: 0.4em;
  color: var(--text-secondary);
}

.preview-content p { margin-bottom: 1em; }

.preview-content a {
  color: var(--link-color);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color var(--transition);
}

.preview-content a:hover { border-bottom-color: var(--link-color); }

.preview-content strong { font-weight: 600; color: var(--text-primary); }
.preview-content em { font-style: italic; }

.preview-content blockquote {
  border-left: 3px solid var(--accent);
  margin: 1.5em 0;
  padding: 0.6em 1.2em;
  color: var(--text-secondary);
  background: var(--accent-subtle);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-style: italic;
}

.preview-content blockquote p:last-child { margin-bottom: 0; }

.preview-content code {
  font-family: var(--font-mono);
  font-size: 0.88em;
  background: var(--bg-code);
  padding: 0.15em 0.4em;
  border-radius: 4px;
  color: var(--text-primary);
}

.preview-content pre {
  margin: 1.5em 0;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  position: relative;
}

.preview-content pre code {
  display: block;
  padding: 1.2em 1.5em;
  font-size: 13.5px;
  line-height: 1.65;
  overflow-x: auto;
  border-radius: 0;
}

.preview-content pre .code-lang {
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 11px;
  color: #666;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  opacity: 0.5;
}

.preview-content ul, .preview-content ol {
  margin: 0.8em 0 1em 0;
  padding-left: 1.6em;
}

.preview-content li { margin-bottom: 0.35em; line-height: 1.7; }

.preview-content li > ul, .preview-content li > ol {
  margin-top: 0.3em;
  margin-bottom: 0.3em;
}

.preview-content hr {
  border: none;
  height: 1px;
  background: var(--border-color);
  margin: 2.5em 0;
}

.preview-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 1.5em 0;
  font-family: var(--font-sans);
  font-size: 0.92em;
  box-shadow: var(--shadow-sm);
  border-radius: var(--radius);
  overflow: hidden;
}

.preview-content thead { background: var(--bg-secondary); }

.preview-content th {
  font-weight: 600;
  text-align: left;
  padding: 10px 16px;
  border-bottom: 2px solid var(--border-color);
  color: var(--text-secondary);
  font-size: 0.9em;
  letter-spacing: 0.02em;
}

.preview-content td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border-subtle);
}

.preview-content tbody tr:last-child td { border-bottom: none; }
.preview-content tbody tr:hover { background: var(--bg-hover); }

.preview-content img {
  max-width: 100%;
  border-radius: var(--radius);
  margin: 1em 0;
  box-shadow: var(--shadow-sm);
}

.preview-content .task-list-item {
  list-style: none;
  margin-left: -1.6em;
  padding-left: 0;
}

.preview-content .task-list-item input[type="checkbox"] {
  margin-right: 0.5em;
  accent-color: var(--accent);
}

.preview-content .katex-display { margin: 1.5em 0; overflow-x: auto; }

.preview-content mark {
  background: #fef08a;
  padding: 0.1em 0.3em;
  border-radius: 3px;
}

[data-theme="dark"] .preview-content mark {
  background: #854d0e;
  color: #fef3c7;
}

/* ─── Drop Zone ─── */
.drop-overlay {
  position: fixed;
  inset: 0;
  background: rgba(194, 149, 107, 0.15);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}

.drop-overlay.active { display: flex; }

.drop-message {
  background: var(--bg-preview);
  border: 2px dashed var(--accent);
  border-radius: 16px;
  padding: 48px 64px;
  text-align: center;
  box-shadow: var(--shadow-lg);
}

.drop-message svg { width: 48px; height: 48px; color: var(--accent); margin-bottom: 16px; }

.drop-message h3 {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.drop-message p { font-size: 14px; color: var(--text-secondary); }

/* ─── Welcome Screen ─── */
.welcome {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}

.welcome.hidden { display: none; }

.welcome-content { max-width: 420px; }

.welcome-icon { width: 64px; height: 64px; color: var(--accent); margin-bottom: 24px; opacity: 0.7; }

.welcome h2 {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text-primary);
}

.welcome p {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 24px;
}

.welcome-actions { display: flex; gap: 12px; justify-content: center; }

/* ─── Status Bar ─── */
.statusbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 4px 16px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  font-size: 11px;
  color: var(--text-tertiary);
  flex-shrink: 0;
  transition: background var(--transition), border-color var(--transition);
}

.statusbar-spacer { flex: 1; }

/* ─── Toast ─── */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text-primary);
  color: var(--bg-primary);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 999;
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

/* ─── Print ─── */
@media print {
  .toolbar, .statusbar, .editor-panel, .resize-handle, .preview-header, .format-bar, .drop-overlay, .toast { display: none !important; }
  body { height: auto !important; overflow: visible !important; }
  .main { overflow: visible !important; display: block !important; }
  .preview-panel {
    border: none !important;
    overflow: visible !important;
    display: block !important;
    height: auto !important;
  }
  #preview { padding: 0 !important; overflow: visible !important; height: auto !important; }
  .preview-content { max-width: 100% !important; }
}

/* ─── Responsive ─── */
@media (max-width: 768px) {
  #preview { padding: 24px 20px; }
  #editorContainer .CodeMirror-scroll { padding: 16px; }
  .toolbar { padding: 8px 10px; gap: 4px; }
  .toolbar-filename { display: none; }
  .format-bar { padding: 4px 8px; }
}
</style>

<script>
// ─── State ───
let currentFile = null;
let isDirty = false;
let currentView = 'both';
let editorRatio = 0.5;

const previewContent = document.getElementById('previewContent');
const editorPanel = document.getElementById('editorPanel');
const previewPanel = document.getElementById('previewPanel');
const resizeHandle = document.getElementById('resizeHandle');
const welcomeScreen = document.getElementById('welcomeScreen');
const filenameDisplay = document.getElementById('filenameDisplay');
const fileInput = document.getElementById('fileInput');
const toast = document.getElementById('toast');

// ─── CodeMirror Setup ───
const cmEditor = CodeMirror(document.getElementById('editorContainer'), {
  value: '',
  mode: 'gfm',
  lineWrapping: true,
  lineNumbers: false,
  theme: 'default',
  viewportMargin: 50,
  inputStyle: 'contenteditable',
  autofocus: false,
  indentUnit: 2,
  tabSize: 2,
  indentWithTabs: false,
  extraKeys: {
    'Tab': (cm) => cm.execCommand('indentMore'),
    'Shift-Tab': (cm) => cm.execCommand('indentLess'),
  }
});

// ─── Marked Configuration ───
const renderer = new marked.Renderer();

renderer.code = function(code, language) {
  const text = typeof code === 'object' ? code.text : code;
  const lang = typeof code === 'object' ? code.lang : language;
  let highlighted;
  try {
    if (lang && hljs.getLanguage(lang)) {
      highlighted = hljs.highlight(text, { language: lang }).value;
    } else {
      highlighted = hljs.highlightAuto(text).value;
    }
  } catch(e) {
    highlighted = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  const langLabel = lang ? `<span class="code-lang">${lang}</span>` : '';
  return `<pre>${langLabel}<code class="hljs">${highlighted}</code></pre>`;
};

renderer.listitem = function(text) {
  const t = typeof text === 'object' ? text.text : text;
  if (t.startsWith('<input')) {
    return `<li class="task-list-item">${t}</li>`;
  }
  return `<li>${t}</li>`;
};

marked.setOptions({ renderer, breaks: true, gfm: true });

// ─── KaTeX support ───
function renderMath(text) {
  text = text.replace(/\$\$([\s\S]+?)\$\$/g, (m, math) => {
    try { return katex.renderToString(math.trim(), { displayMode: true, throwOnError: false }); }
    catch(e) { return m; }
  });
  text = text.replace(/\$([^\$\n]+?)\$/g, (m, math) => {
    try { return katex.renderToString(math.trim(), { displayMode: false, throwOnError: false }); }
    catch(e) { return m; }
  });
  return text;
}

// ─── Render ───
let lastRenderedText = '';
let rafId = null;

function render() {
  if (currentView === 'editor') { updateStats(); return; }
  const raw = cmEditor.getValue();
  if (raw === lastRenderedText) return;
  lastRenderedText = raw;
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(() => {
    previewContent.innerHTML = marked.parse(renderMath(raw));
    rafId = null;
  });
  updateStats();
}

// ─── Stats ───
const charCountEl = document.getElementById('charCount');
const wordCountEl = document.getElementById('wordCount');
const lineCountEl = document.getElementById('lineCount');
let statsTimer = null;

function updateStats() {
  if (statsTimer) return;
  const interval = cmEditor.lineCount() > 2000 ? 500 : 100;
  statsTimer = setTimeout(() => {
    statsTimer = null;
    const text = cmEditor.getValue();
    const len = text.length;
    charCountEl.textContent = len + ' chars';
    lineCountEl.textContent = cmEditor.lineCount() + ' lines';
    if (len < 50000) {
      const cjk = (text.match(/[\u3000-\u9FFF\uF900-\uFAFF]/g) || []).length;
      const words = (text.match(/[a-zA-Z]+/g) || []).length;
      wordCountEl.textContent = (cjk + words) + ' words';
    } else {
      wordCountEl.textContent = '—';
    }
  }, interval);
}

// ─── Change handler ───
let renderTimer;
cmEditor.on('change', () => {
  isDirty = true;
  updateFilenameDisplay();
  clearTimeout(renderTimer);
  const lines = cmEditor.lineCount();
  const delay = lines > 3000 ? 800 : lines > 1000 ? 400 : 150;
  renderTimer = setTimeout(render, delay);
});

// ─── Format Insertion (CodeMirror) ───
function insertFormat(type) {
  const sel = cmEditor.getSelection();
  const cursor = cmEditor.getCursor();
  let replacement = '';

  switch(type) {
    case 'h1':    replacement = '# ' + (sel || 'Heading 1'); break;
    case 'h2':    replacement = '## ' + (sel || 'Heading 2'); break;
    case 'h3':    replacement = '### ' + (sel || 'Heading 3'); break;
    case 'bold':  replacement = '**' + (sel || 'text') + '**'; break;
    case 'italic': replacement = '*' + (sel || 'text') + '*'; break;
    case 'strike': replacement = '~~' + (sel || 'text') + '~~'; break;
    case 'ul':    replacement = '- ' + (sel || 'List item'); break;
    case 'ol':    replacement = '1. ' + (sel || 'List item'); break;
    case 'task':  replacement = '- [ ] ' + (sel || 'Task'); break;
    case 'quote': replacement = '> ' + (sel || 'Quote text'); break;
    case 'code':  replacement = '`' + (sel || 'code') + '`'; break;
    case 'codeblock': replacement = '```\n' + (sel || '') + '\n```'; break;
    case 'link':  replacement = '[' + (sel || 'Link text') + '](url)'; break;
    case 'image': replacement = '![' + (sel || 'alt text') + '](url)'; break;
    case 'table':
      replacement = '| Col 1 | Col 2 | Col 3 |\n| --- | --- | --- |\n| Data | Data | Data |';
      break;
    case 'hr': replacement = '\n---\n'; break;
  }

  cmEditor.replaceSelection(replacement);
  cmEditor.focus();
}

// ─── File Operations ───
function createNew() {
  if (isDirty && !confirm('You have unsaved changes. Create a new document?')) return;
  currentFile = null;
  cmEditor.setValue('');
  cmEditor.clearHistory();
  isDirty = false;
  welcomeScreen.classList.add('hidden');
  setView(currentView);
  updateFilenameDisplay();
  render();
  cmEditor.focus();
  showToast('New document created');
}

function openFile() { fileInput.click(); }

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  loadFile(file);
  fileInput.value = '';
});

function loadFile(file) {
  if (isDirty && !confirm('You have unsaved changes. Open a new file?')) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    currentFile = file.name;
    cmEditor.setValue(e.target.result);
    cmEditor.clearHistory();
    isDirty = false;
    welcomeScreen.classList.add('hidden');
    setView(currentView);
    updateFilenameDisplay();
    render();
    showToast(`${file.name} opened`);
  };
  reader.readAsText(file);
}

function saveFile() {
  const content = cmEditor.getValue();
  const filename = currentFile || 'Untitled.md';
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  isDirty = false;
  if (!currentFile) currentFile = filename;
  updateFilenameDisplay();
  showToast('Saved');
}

function saveAsFile() {
  const newName = prompt('Enter file name:', currentFile || 'Untitled.md');
  if (!newName) return;
  const filename = newName.endsWith('.md') ? newName : newName + '.md';
  const content = cmEditor.getValue();
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  currentFile = filename;
  isDirty = false;
  updateFilenameDisplay();
  showToast(`${filename} saved`);
}

function updateFilenameDisplay() {
  const name = currentFile || 'Untitled Document';
  const unsaved = isDirty ? '<span class="unsaved"> ●</span>' : '';
  filenameDisplay.innerHTML = name + unsaved;
}

// ─── View Modes ───
// ─── View Modes ───
function setView(mode) {
  const prevView = currentView;
  let savedScrollRatio = null;

  // プレビューが非表示になる前に、現在のスクロール割合を計算して保持する
  if (prevView === 'preview' && mode === 'editor') {
    const previewEl = document.getElementById('preview');
    const previewPadTop = 40; // プレビューのpadding-top
    const contentScrollTop = Math.max(0, previewEl.scrollTop - previewPadTop);
    const contentScrollHeight = Math.max(1, previewEl.scrollHeight - previewEl.clientHeight - previewPadTop);
    savedScrollRatio = contentScrollTop / contentScrollHeight;
  }

  currentView = mode;
  document.querySelectorAll('.view-toggle .btn').forEach(b => b.classList.remove('active'));

  if (mode === 'both') {
    editorPanel.classList.remove('hidden');
    previewPanel.classList.remove('hidden');
    resizeHandle.classList.remove('hidden');
    document.getElementById('viewBoth').classList.add('active');
    editorPanel.style.flex = editorRatio;
    previewPanel.style.flex = 1 - editorRatio;
  } else if (mode === 'editor') {
    editorPanel.classList.remove('hidden');
    previewPanel.classList.add('hidden');
    resizeHandle.classList.add('hidden');
    document.getElementById('viewEditor').classList.add('active');
    editorPanel.style.flex = 1;
  } else {
    editorPanel.classList.add('hidden');
    previewPanel.classList.remove('hidden');
    resizeHandle.classList.add('hidden');
    document.getElementById('viewPreview').classList.add('active');
    previewPanel.style.flex = 1;
  }
  
  setTimeout(() => {
    cmEditor.refresh();

    // エディターが再描画された後に、保持しておいた割合を使ってスクロール位置を同期
    if (savedScrollRatio !== null) {
      const cmScroll = cmEditor.getScrollInfo();
      const editorPadTop = 24; // エディターのpadding-top
      const targetTop = editorPadTop + savedScrollRatio * Math.max(1, cmScroll.height - cmScroll.clientHeight - editorPadTop);
      cmEditor.scrollTo(null, targetTop);
    }
  }, 10);
  
  render();
}

// ─── Preview → Editor Scroll Sync ───
// When the preview is scrolled, after a short pause, the editor follows to the same relative position.
const previewEl = document.getElementById('preview');

let previewScrollTimer = null;
let isSyncingFromPreview = false;
let syncEnabled = true;

function syncEditorToPreview() {
  if (!syncEnabled || currentView !== 'both') return;

  const previewScrollable = previewEl;
  // Subtract top padding (40px) so ratio is based on content, not padding
  const previewPadTop = 40;
  const contentScrollTop = Math.max(0, previewScrollable.scrollTop - previewPadTop);
  const contentScrollHeight = Math.max(1,
    previewScrollable.scrollHeight - previewScrollable.clientHeight - previewPadTop);
  const scrollRatio = contentScrollTop / contentScrollHeight;

  const cmScroll = cmEditor.getScrollInfo();
  // CodeMirror padding-top is 24px
  const editorPadTop = 24;
  const targetTop = editorPadTop + scrollRatio * Math.max(1, cmScroll.height - cmScroll.clientHeight - editorPadTop);

  isSyncingFromPreview = true;
  cmEditor.scrollTo(null, targetTop);
  setTimeout(() => { isSyncingFromPreview = false; }, 200);
}

previewEl.addEventListener('scroll', () => {
  if (currentView !== 'both') return;
  clearTimeout(previewScrollTimer);
  previewScrollTimer = setTimeout(syncEditorToPreview, 600);
});

function toggleScrollSync() {
  syncEnabled = !syncEnabled;
  const btn = document.getElementById('syncScrollBtn');
  if (syncEnabled) {
    btn.style.opacity = '1';
    btn.title = 'Scroll sync ON — click to disable';
    showToast('Scroll sync enabled');
  } else {
    btn.style.opacity = '0.35';
    btn.title = 'Scroll sync OFF — click to enable';
    showToast('Scroll sync disabled');
  }
}

// ─── Resize Handle ───
let isResizing = false;
resizeHandle.addEventListener('mousedown', (e) => {
  isResizing = true;
  resizeHandle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const main = document.getElementById('mainContent');
  const rect = main.getBoundingClientRect();
  editorRatio = Math.max(0.2, Math.min(0.8, (e.clientX - rect.left) / rect.width));
  editorPanel.style.flex = editorRatio;
  previewPanel.style.flex = 1 - editorRatio;
});

document.addEventListener('mouseup', () => {
  if (isResizing) {
    isResizing = false;
    resizeHandle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    cmEditor.refresh();
  }
});

// ─── Drag & Drop ───
let dragCounter = 0;
document.addEventListener('dragenter', (e) => {
  e.preventDefault(); dragCounter++;
  document.getElementById('dropOverlay').classList.add('active');
});
document.addEventListener('dragleave', (e) => {
  e.preventDefault(); dragCounter--;
  if (dragCounter === 0) document.getElementById('dropOverlay').classList.remove('active');
});
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  e.preventDefault(); dragCounter = 0;
  document.getElementById('dropOverlay').classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file && (file.name.endsWith('.md') || file.name.endsWith('.markdown') || file.name.endsWith('.txt'))) {
    loadFile(file);
  } else {
    showToast('Please drop a Markdown file (.md)');
  }
});

// ─── Theme ───
function toggleTheme() {
  const isDark = document.body.getAttribute('data-theme') === 'dark';
  document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem('luminous-theme', isDark ? 'light' : 'dark');
}

const savedTheme = localStorage.getItem('luminous-theme');
if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  document.body.setAttribute('data-theme', 'dark');
}

// ─── Keyboard Shortcuts ───
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'S') { e.preventDefault(); saveAsFile(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveFile(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'o') { e.preventDefault(); openFile(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); createNew(); }
});

function printPreview() { window.print(); }

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ─── Init ───
window.addEventListener('beforeunload', (e) => {
  if (isDirty) {
    e.preventDefault();
    e.returnValue = '';
  }
});
updateStats();
</script>
